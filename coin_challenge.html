<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「10個和1個」硬幣解題大挑戰 🎨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        /* 課本風格的硬幣樣式 */
        .coin-10 {
            background: radial-gradient(circle, #ffe4e6 20%, #fda4af 80%);
            border: 3px solid #f43f5e;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.6);
        }
        .coin-1 {
            background: radial-gradient(circle, #ecfeff 20%, #a5f3fc 80%);
            border: 3px solid #0891b2;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.6);
        }
        .coin-10-slashed {
            background: radial-gradient(circle, #f1f5f9 20%, #cbd5e1 80%);
            border: 3px dashed #94a3b8;
            opacity: 0.5;
            position: relative;
        }
        .coin-10-slashed::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 4px;
            background-color: #ef4444;
            transform: rotate(-45deg);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .coin-1-crossed {
            position: relative;
        }
        .coin-1-crossed::after {
            content: '❌';
            position: absolute;
            font-size: 2rem;
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        /* 1元硬幣畫斜線樣式 */
        .coin-1-slashed {
            position: relative;
            opacity: 0.85;
        }
        .coin-1-slashed::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 4px;
            background-color: #ef4444;
            transform: rotate(-45deg);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* 10合1粉紅色虛線包裹框 */
        .wrap-container {
            border: 4px dashed #ec4899;
            background-color: rgba(253, 242, 248, 0.75);
            border-radius: 1.5rem;
            padding: 0.75rem;
            transition: all 0.5s ease-in-out;
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #ec4899; }
            50% { border-color: #f472b6; }
        }

        /* 轉折期 10元浮動跟發光特效 */
        @keyframes floatAndPulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.08); }
        }
        .trans-coin-active {
            animation: floatAndPulse 2s infinite ease-in-out;
            box-shadow: 0 0 20px #f43f5e, inset 0 2px 4px rgba(255, 255, 255, 0.6);
            border: 4px solid #f43f5e !important;
            cursor: pointer;
        }

        /* 呼吸動畫 */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse-active {
            animation: pulse-slow 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 預設課本題目資料庫 (對應課本單元)
        const textbookProblems = {
            addition: [
                { id: 'add1', num1: 32, num2: 8, op: '+', desc: '課本P.108 撲滿裡有32元，再放進8元。', answer: 40 },
                { id: 'add2', num1: 47, num2: 5, op: '+', desc: '課本P.108 試試看：47 + 5', answer: 52 },
                { id: 'add3', num1: 8, num2: 27, op: '+', desc: '課本P.109 小剛買了8元糖果和27元飲料。', answer: 35 },
                { id: 'add4', num1: 6, num2: 49, op: '+', desc: '課本P.109 試試看：6 + 49', answer: 55 }
            ],
            subtraction: [
                { id: 'sub1', num1: 20, num2: 5, op: '-', desc: '課本P.112 媽媽有20個雞蛋，用掉5個。', answer: 15 },
                { id: 'sub2', num1: 30, num2: 8, op: '-', desc: '課本P.112 試試看①：30 - 8', answer: 22 },
                { id: 'sub3', num1: 40, num2: 6, op: '-', desc: '課本P.112 試試看②：40 - 6', answer: 34 },
                { id: 'sub4', num1: 34, num2: 8, op: '-', desc: '課本P.113 米店有8包香米和34包越光米，少幾包？', answer: 26 },
                { id: 'sub5', num1: 42, num2: 9, op: '-', desc: '課本P.113 試試看：42 - 9', answer: 33 }
            ]
        };

        function App() {
            // 基礎狀態
            const [activeTab, setActiveTab] = useState('preset'); // preset, random, custom
            const [selectedCategory, setSelectedCategory] = useState('addition'); // addition, subtraction
            const [currentProblem, setCurrentProblem] = useState(textbookProblems.addition[0]);
            
            // 解題步驟控制
            const [step, setStep] = useState(1);
            
            // 語音與音效設定
            const [speechEnabled, setSpeechEnabled] = useState(true);
            const [soundEnabled, setSoundEnabled] = useState(true);
            
            // 家長與老師引導指南 Modal 開關
            const [showGuide, setShowGuide] = useState(false);

            // 心算鎖定數值
            const [mentalLockValue, setMentalLockValue] = useState('');
            const [isMentalLocked, setIsMentalLocked] = useState(false);

            // 使用者手動繪製的硬幣狀態
            const [drawnTens, setDrawnTens] = useState(0);
            const [drawnOnes, setDrawnOnes] = useState(0);
            
            // 加法步驟2的加數硬幣狀態
            const [drawnAddTens, setDrawnAddTens] = useState(0);
            const [drawnAddOnes, setDrawnAddOnes] = useState(0);

            // 加法合十進階狀態
            const [selectedOnesForCarry, setSelectedOnesForCarry] = useState([]); // 被選取來進位的一元索引
            const [additionCarryStage, setAdditionCarryStage] = useState('selecting'); // selecting, wrapped, transitional-coin, done

            // 減法狀態
            const [isExchanged, setIsExchanged] = useState(false); // 是否已把1個十元換成10個一元
            const [crossedOnes, setCrossedOnes] = useState([]); // 被打叉的一元硬幣索引清單

            // 加法進位狀態
            const [isCarried, setIsCarried] = useState(false); // 是否已把10個一元換成1個十元

            // 最終答案輸入值與檢查結果
            const [userAnswer, setUserAnswer] = useState('');
            const [answerResult, setAnswerResult] = useState(null); // 'correct', 'incorrect'

            // --- 自訂出題狀態 ---
            const [customNum1, setCustomNum1] = useState('35');
            const [customNum2, setCustomNum2] = useState('7');
            const [customOp, setCustomOp] = useState('+');

            // --- 隨機出題模式狀態 ---
            const [randomOpType, setRandomOpType] = useState('mixed'); // addition, subtraction, mixed
            const [randomTotalQuestions, setRandomTotalQuestions] = useState(5); // 5, 10, 20
            const [randomQuestionsList, setRandomQuestionsList] = useState([]);
            const [randomCurrentIndex, setRandomCurrentIndex] = useState(0);
            const [randomScore, setRandomScore] = useState(0);
            const [isRandomActive, setIsRandomActive] = useState(false);
            const [isRandomFinished, setIsRandomFinished] = useState(false);

            // 提示音效產生器 (Web Audio API)
            const playSound = (type) => {
                if (!soundEnabled) return;
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    if (type === 'click') {
                        osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                        gain.gain.setValueAtTime(0.08, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.1);
                    } else if (type === 'exchange') {
                        const now = ctx.currentTime;
                        [440, 554, 659, 880].forEach((f, i) => {
                            const o = ctx.createOscillator();
                            const g = ctx.createGain();
                            o.connect(g);
                            g.connect(ctx.destination);
                            o.frequency.setValueAtTime(f, now + i * 0.06);
                            g.gain.setValueAtTime(0.05, now + i * 0.06);
                            g.gain.exponentialRampToValueAtTime(0.005, now + i * 0.06 + 0.2);
                            o.start(now + i * 0.06);
                            o.stop(now + i * 0.06 + 0.25);
                        });
                    } else if (type === 'correct') {
                        const now = ctx.currentTime;
                        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                            const o = ctx.createOscillator();
                            const g = ctx.createGain();
                            o.connect(g);
                            g.connect(ctx.destination);
                            o.frequency.setValueAtTime(f, now + i * 0.08);
                            g.gain.setValueAtTime(0.06, now + i * 0.08);
                            g.gain.exponentialRampToValueAtTime(0.005, now + i * 0.08 + 0.3);
                            o.start(now + i * 0.08);
                            o.stop(now + i * 0.08 + 0.4);
                        });
                    } else if (type === 'wrong') {
                        osc.frequency.setValueAtTime(220, ctx.currentTime);
                        gain.gain.setValueAtTime(0.12, ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    }
                } catch (e) {
                    console.log("音效播放失敗", e);
                }
            };

            // 台灣繁體中文語音導讀 (TTS)
            const speak = (text) => {
                if (!speechEnabled) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                
                const voices = window.speechSynthesis.getVoices();
                const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('TW'));
                if (twVoice) utterance.voice = twVoice;
                
                utterance.rate = 0.95; // 稍微放慢速度
                window.speechSynthesis.speak(utterance);
            };

            // 當步驟或題目改變時，自動發出語音提示
            useEffect(() => {
                let text = "";
                const num1 = currentProblem.num1;
                const num2 = currentProblem.num2;
                const op = currentProblem.op;

                const prefix = activeTab === 'random' ? `第 ${randomCurrentIndex + 1} 題挑戰，` : '';

                if (step === 1) {
                    text = `${prefix}我們要挑戰的題目是：${num1} ${op === '+' ? '加' : '減'} ${num2}。在開始畫圖前，你覺得答案是多少呢？先用心算猜個答案，把它悄悄鎖定吧！`;
                } else if (step === 2) {
                    text = `現在，我們要在畫板上畫出第一個數：${num1}。它有 ${Math.floor(num1/10)} 個十和 ${num1%10} 個一。請點擊按鈕，把它畫出來吧！`;
                } else if (step === 3) {
                    if (op === '+') {
                        text = `畫得太好了！接著我們要加上 ${num2}。請在個位畫上 ${num2} 個一。`;
                    } else {
                        const originalOnes = num1 % 10;
                        if (originalOnes >= num2) {
                            text = `個位有 ${originalOnes} 個一，夠減去 ${num2}。請直接進入下一步，進行扣除。`;
                        } else {
                            text = `我們要減去 ${num2}。看看個位，只有 ${originalOnes} 個一，不夠減對不對？請點擊左邊一個紅色十元，把它換成十個藍色的一元吧！`;
                        }
                    }
                } else if (step === 4) {
                    if (op === '+') {
                        if (additionCarryStage === 'selecting') {
                            text = `個位現在有十個以上的一元硬幣。請點選其中的十個一元，把它們畫上斜線合十。`;
                        } else if (additionCarryStage === 'wrapped') {
                            text = `太棒了！十個一元都劃好了！請點擊下方的粉紅色按鈕，把它們包起來。`;
                        } else if (additionCarryStage === 'transitional-coin') {
                            text = `哇！十個一元包起來，成功融合成一個新的十元硬幣了！請點擊這個十元，把它搬去左邊的十位欄位吧！`;
                        }
                    } else {
                        text = `個位現在夠減了！請點選 ${num2} 個一元硬幣，把它們打叉扣除。`;
                    }
                } else if (step === 5) {
                    text = `太棒了！現在數數看畫面上，剩下幾個十元？幾個一元？把它們合起來，在空格寫下最後的答案。`;
                } else if (step === 6) {
                    const isLockedCorrect = parseInt(mentalLockValue) === currentProblem.answer;
                    if (isLockedCorrect) {
                        text = `太厲害了！你畫得完全正確，而且跟你一開始鎖定的心算答案一模一樣！畫圖其實很簡單，對不對！`;
                    } else {
                        text = `太厲害了！你算出正確答案囉！雖然一開始的心算答案有一點點小誤差，但是畫圖幫你找到了正確的答案，真是好幫手！`;
                    }
                }
                
                const timer = setTimeout(() => speak(text), 300);
                return () => clearTimeout(timer);
            }, [step, currentProblem, additionCarryStage, activeTab, randomCurrentIndex]);

            // --- 隨機挑戰模式：自動智慧接軌 (Auto-Transition) ---
            // 1. 第一步畫 Num1 完成自動跳步驟 3
            useEffect(() => {
                if (activeTab === 'random' && step === 2 && isNum1Correct()) {
                    const timer = setTimeout(() => {
                        playSound('exchange');
                        speak("太棒了，你畫對第一個數囉！系統自動幫你進入下一步！");
                        setStep(3);
                    }, 800);
                    return () => clearTimeout(timer);
                }
            }, [drawnTens, drawnOnes, step, activeTab]);

            // 2. 第二步畫加數 Num2 完成自動跳步驟 4 (進位) 或 5 (無進位)
            useEffect(() => {
                if (activeTab === 'random' && step === 3 && currentProblem.op === '+' && isNum2Correct()) {
                    const timer = setTimeout(() => {
                        playSound('exchange');
                        const totalOnes = (currentProblem.num1 % 10) + currentProblem.num2;
                        if (totalOnes >= 10) {
                            speak("加數也畫對囉！現在十個一元要合體了，系統自動進入合十換錢步驟！");
                            setStep(4);
                        } else {
                            speak("加數畫對囉！系統自動進入最後一步，數數看答案吧！");
                            setStep(5);
                        }
                    }, 800);
                    return () => clearTimeout(timer);
                }
            }, [drawnAddTens, drawnAddOnes, step, activeTab]);

            // 3. 減法：打叉扣除數量足夠時，自動跳步驟 5
            useEffect(() => {
                if (activeTab === 'random' && step === 4 && currentProblem.op === '-' && crossedOnes.length === currentProblem.num2) {
                    const timer = setTimeout(() => {
                        playSound('exchange');
                        speak("扣除成功！系統自動進入最後一步，寫下你的答案吧！");
                        setStep(5);
                    }, 800);
                    return () => clearTimeout(timer);
                }
            }, [crossedOnes, step, activeTab]);

            // 4. 進位挑選：加法在 selecting 階段集滿 10 個，自動進入 wrapped (包起來) 階段
            useEffect(() => {
                if (activeTab === 'random' && step === 4 && currentProblem.op === '+' && additionCarryStage === 'selecting' && selectedOnesForCarry.length === 10) {
                    const timer = setTimeout(() => {
                        playSound('exchange');
                        speak("選好十個囉！系統自動幫你圈起來了！點擊粉紅色按鈕包起來吧！");
                        setAdditionCarryStage('wrapped');
                    }, 800);
                    return () => clearTimeout(timer);
                }
            }, [selectedOnesForCarry, additionCarryStage, step, activeTab]);


            // 初始化與題目重置
            const resetProblem = (prob) => {
                setCurrentProblem(prob);
                setStep(1);
                setMentalLockValue('');
                setIsMentalLocked(false);
                setDrawnTens(0);
                setDrawnOnes(0);
                setDrawnAddTens(0);
                setDrawnAddOnes(0);
                setIsExchanged(false);
                setCrossedOnes([]);
                setIsCarried(false);
                setSelectedOnesForCarry([]);
                setAdditionCarryStage('selecting');
                setUserAnswer('');
                setAnswerResult(null);
            };

            // 產生隨機題目 (兩位數以內，保證需要進退位以達練習目的)
            const generateRandomQuestions = (opType, count) => {
                const list = [];
                for (let i = 0; i < count; i++) {
                    const op = opType === 'mixed' ? (Math.random() > 0.5 ? '+' : '-') : (opType === 'addition' ? '+' : '-');
                    let num1, num2, answer;
                    
                    if (op === '+') {
                        // 保證有進位：個位相加大於等於 10
                        const tens = Math.floor(Math.random() * 8) + 1; // 10 ~ 80
                        const ones1 = Math.floor(Math.random() * 8) + 2; // 2 ~ 9
                        const ones2 = Math.floor(Math.random() * (10 - ones1)) + ones1; // 確保 ones1 + ones2 >= 10
                        num1 = tens * 10 + ones1;
                        num2 = ones2;
                        answer = num1 + num2;
                    } else {
                        // 保證有退位（借十）：個位不夠減
                        const tens = Math.floor(Math.random() * 8) + 2; // 20 ~ 90
                        const ones1 = Math.floor(Math.random() * 8); // 0 ~ 7
                        const ones2 = Math.floor(Math.random() * (9 - ones1)) + ones1 + 1; // 確保 ones1 < ones2
                        num1 = tens * 10 + ones1;
                        num2 = ones2;
                        answer = num1 - num2;
                    }

                    list.push({
                        id: `rand_${Date.now()}_${i}`,
                        num1,
                        num2,
                        op,
                        desc: `隨機挑戰第 ${i + 1} 題：${num1} ${op === '+' ? '加' : '減'} ${num2}`,
                        answer
                    });
                }
                return list;
            };

            // 開始隨機挑戰
            const handleStartRandomChallenge = () => {
                playSound('exchange');
                const list = generateRandomQuestions(randomOpType, randomTotalQuestions);
                setRandomQuestionsList(list);
                setRandomCurrentIndex(0);
                setRandomScore(0);
                setIsRandomActive(true);
                setIsRandomFinished(false);
                resetProblem(list[0]);
            };

            // 隨機挑戰下一題或結束
            const handleRandomNext = () => {
                const nextIndex = randomCurrentIndex + 1;
                if (nextIndex < randomQuestionsList.length) {
                    setRandomCurrentIndex(nextIndex);
                    resetProblem(randomQuestionsList[nextIndex]);
                } else {
                    playSound('correct');
                    setIsRandomFinished(true);
                    speak(`恭喜你！完成了全部 ${randomTotalQuestions} 題的隨機大挑戰！`);
                }
            };

            // 放棄挑戰重設
            const handleResetRandomSettings = () => {
                playSound('click');
                setIsRandomActive(false);
                setIsRandomFinished(false);
                resetProblem(textbookProblems.addition[0]);
            };

            // 自動幫忙畫第一個數
            const autoDrawNum1 = () => {
                playSound('click');
                setDrawnTens(Math.floor(currentProblem.num1 / 10));
                setDrawnOnes(currentProblem.num1 % 10);
            };

            // 自動畫加數
            const autoDrawNum2 = () => {
                playSound('click');
                setDrawnAddTens(Math.floor(currentProblem.num2 / 10));
                setDrawnAddOnes(currentProblem.num2 % 10);
            };

            // 處理手動繪製 10s & 1s
            const handleDrawCoin = (type, action) => {
                playSound('click');
                if (step === 2) {
                    if (type === 10) {
                        const target = Math.floor(currentProblem.num1 / 10);
                        if (action === 'add' && drawnTens < target) setDrawnTens(drawnTens + 1);
                        if (action === 'sub' && drawnTens > 0) setDrawnTens(drawnTens - 1);
                    } else {
                        const target = currentProblem.num1 % 10;
                        if (action === 'add' && drawnOnes < target) setDrawnOnes(drawnOnes + 1);
                        if (action === 'sub' && drawnOnes > 0) setDrawnOnes(drawnOnes - 1);
                    }
                } else if (step === 3 && currentProblem.op === '+') {
                    if (type === 10) {
                        const target = Math.floor(currentProblem.num2 / 10);
                        if (action === 'add' && drawnAddTens < target) setDrawnAddTens(drawnAddTens + 1);
                        if (action === 'sub' && drawnAddTens > 0) setDrawnAddTens(drawnAddTens - 1);
                    } else {
                        const target = currentProblem.num2 % 10;
                        if (action === 'add' && drawnAddOnes < target) setDrawnAddOnes(drawnAddOnes + 1);
                        if (action === 'sub' && drawnAddOnes > 0) setDrawnAddOnes(drawnAddOnes - 1);
                    }
                }
            };

            // 檢查第一個數繪製是否正確
            const isNum1Correct = () => {
                return (drawnTens === Math.floor(currentProblem.num1 / 10)) && 
                       (drawnOnes === currentProblem.num1 % 10);
            };

            // 檢查加數繪製是否正確
            const isNum2Correct = () => {
                return (drawnAddTens === Math.floor(currentProblem.num2 / 10)) && 
                       (drawnAddOnes === currentProblem.num2 % 10);
            };

            // 處理減法中的十元換錢
            const handleExchangeTen = (index) => {
                if (step !== 3 || currentProblem.op !== '-') return;
                playSound('exchange');
                setIsExchanged(true);
                setStep(4);
            };

            // 處理減法中點擊一元進行打叉
            const handleToggleCross = (globalIndex) => {
                if (step !== 4 || currentProblem.op !== '-') return;
                
                playSound('click');
                if (crossedOnes.includes(globalIndex)) {
                    setCrossedOnes(crossedOnes.filter(idx => idx !== globalIndex));
                } else {
                    if (crossedOnes.length < currentProblem.num2) {
                        setCrossedOnes([...crossedOnes, globalIndex]);
                    }
                }
            };

            // 檢查最終答案
            const handleCheckAnswer = () => {
                const correctAns = currentProblem.answer;
                if (parseInt(userAnswer) === correctAns) {
                    playSound('correct');
                    setAnswerResult('correct');
                    setStep(6);
                } else {
                    playSound('wrong');
                    setAnswerResult('incorrect');
                    speak(`答案好像不太對喔，數數看畫面上剩下多少硬幣，再試一次看看！`);

            // 自訂題目送出
            const handleCreateCustom = () => {
                const n1 = parseInt(customNum1) || 10;
                const n2 = parseInt(customNum2) || 1;
                const op = customOp;
                
                if (n1 < 10 || n1 > 99) {
                    alert("第一個數請輸入 10 ~ 99 之間");
                    return;
                }
                if (n2 < 1 || n2 > 9) {
                    alert("第二個數請輸入 1 ~ 9 之間（便於個位硬幣的換算與呈現）");
                    return;
                }

                const ans = op === '+' ? (n1 + n2) : (n1 - n2);
                if (ans < 0) {
                    alert("減完不能是負數喔！請重新出題。");
                    return;
                }

                const newProb = {
                    id: 'custom_' + Date.now(),
                    num1: n1,
                    num2: n2,
                    op: op,
                    desc: `自訂題目： ${n1} ${op} ${n2}`,
                    answer: ans

                resetProblem(newProb);
            };

            const totalOnesCount = (currentProblem.num1 % 10) + (currentProblem.op === '+' ? currentProblem.num2 : 0);

            // 渲染個位硬幣的輔助函式
            const renderOnesColumnContent = () => {
                if (currentProblem.op === '+' && step === 4) {

                                        const isSelected = selectedOnesForCarry.includes(i);
                                        return (
                                            <div

                                                    playSound('click');
                                                    if (isSelected) {
                                                        setSelectedOnesForCarry(selectedOnesForCarry.filter(idx => idx !== i));
                                                    } else {
                                                        if (selectedOnesForCarry.length < 10) {
                                                            const nextSelection = [...selectedOnesForCarry, i];
                                                            setSelectedOnesForCarry(nextSelection);
                                                            if (nextSelection.length === 10) {
                                                                playSound('exchange');
                                                                setAdditionCarryStage('wrapped');
                                                            }
                                                        }
                                                    }

                                                class={`w-12 h-12 rounded-full coin-1 text-cyan-700 font-black text-lg flex items-center justify-center shadow select-none cursor-pointer transition-all hover:scale-110 active:scale-95 ring-2 ring-cyan-200
                                                    ${isSelected ? 'coin-1-slashed ring-rose-400 border-rose-500 border-2 scale-105' : ''}
                                                `}
                                            >
                                                1
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    }

                    // 2. 包起來階段
                    if (additionCarryStage === 'wrapped') {
                        return (
                            <div class="flex flex-col items-center justify-center flex-1 space-y-4 w-full animate-in fade-in zoom-in-95 duration-200">
                                <div class="wrap-container w-full max-w-[280px] flex flex-col items-center justify-center space-y-2 shadow-md">
                                    <div class="text-[11px] font-extrabold text-pink-700 animate-pulse flex items-center space-x-1">
                                        <span>🎁 準備合十的一元（共10個）</span>

                                                1
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <button
                                    onClick={() => {
                                        playSound('exchange');

                                    }}

                                >
                                    <span>🎁 把這十個包起來！</span>
                                </button>

                                {leftoverCount > 0 && (
                                    <div class="flex flex-col items-center space-y-1 w-full">
                                        <div class="text-[10px] font-bold text-slate-400">剩下的個位：</div>

                                                    1
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                    if (additionCarryStage === 'transitional-coin') {

                            >
                                <span>{speechEnabled ? '🔊 語音導讀開' : '🔇 語音導讀關'}</span>
                            </button>
                            <button 
                                onClick={() => setSoundEnabled(!soundEnabled)}
                                class={`px-4 py-2 rounded-full font-bold flex items-center space-x-1 text-sm shadow transition ${soundEnabled ? 'bg-amber-400 text-amber-950 hover:bg-amber-500' : 'bg-slate-700 text-slate-300'}`}
                            >
                                <span>{soundEnabled ? '🔔 音效開' : '🔕 音效關'}</span>

                        <div class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-6 py-4 text-white flex justify-between items-center">
                                    <div class="flex items-center space-x-2">

                                                            {additionCarryStage === 'selecting' && '個位現在有十個以上的一元硬幣。請在上方個位區點選 10 個一元，把它們畫上斜線合十。'}
                                                            {additionCarryStage === 'wrapped' && '太棒了！10 個一元都選好囉！請點記個位區的粉紅色按鈕包起來。'}
                                                            {additionCarryStage === 'transitional-coin' && '十個一元融合成一個新的十元硬幣囉！請點擊個位區的紅色十元硬幣，把它搬移到十位欄位。'}
                                                        </p>
                                                    </div>
                                                ) : (
                                                    // 減法扣除一元
                                                    <div class="text-center space-y-3">
                                                        <h4 class="text-orange-950 font-extrabold text-lg flex items-center justify-center space-x-1.5">
                                                            <span>❌</span>
                                                            <span>扣除個位一元硬幣</span>
                                                        </h4>
                                                        <p class="text-slate-600 text-sm max-w-md mx-auto">
                                                            個位現在夠減了！請在上方個位區<b>點選 {currentProblem.num2} 個一元硬幣</b>，將它們打叉扣除。
                                                        </p>
                                                        <div class="bg-orange-50 border border-orange-200 text-orange-800 text-xs font-bold px-4 py-2 rounded-xl inline-block animate-pulse">
                                                            目前已打叉個數：{crossedOnes.length} / {currentProblem.num2}
                                                        </div>
                                                        {crossedOnes.length === currentProblem.num2 && (
                                                            <div class="pt-2">
                                                                <button
                                                                    onClick={() => { playSound('click'); setStep(5); }}
                                                                    class="bg-teal-500 hover:bg-teal-600 text-white font-extrabold px-8 py-3 rounded-2xl shadow-lg transition scale-105 text-sm"
                                                                >
                                                                    扣除完成，前往下一步！ ➡️
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Step 5: 數錢與輸入最後答案 */}
                                        {step === 5 && (
                                            <div class="text-center space-y-4">
                                                <h4 class="text-indigo-950 font-extrabold text-lg flex items-center justify-center space-x-1.5">
                                                    <span>✍️</span>
                                                    <span>數一數，寫答案</span>
                                                </h4>
                                                <p class="text-slate-600 text-sm max-w-md mx-auto">
                                                    大功告成！現在數一數畫面上：<br/>
                                                    十位剩下幾個十元？個位剩下幾個一元？合起來是多少元？
                                                </p>
                                                <div class="flex items-center justify-center space-x-3 max-w-sm mx-auto pt-2">
                                                    <input 
                                                        type="number"
                                                        value={userAnswer}
                                                        onChange={(e) => { setUserAnswer(e.target.value); setAnswerResult(null); }}
                                                        placeholder="最後答案"
                                                        class="w-36 px-4 py-3 border-2 border-slate-200 rounded-2xl text-center font-bold text-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition"
                                                    />
                                                    <button
                                                        onClick={handleCheckAnswer}
                                                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold px-6 py-3.5 rounded-2xl shadow-md transition active:scale-95 text-sm flex items-center space-x-1"
                                                    >
                                                        <span>💡 檢查答案</span>
                                                    </button>
                                                </div>
                                                {answerResult === 'incorrect' && (
                                                    <p class="text-rose-500 font-extrabold text-sm animate-bounce">
                                                        ❌ 答案好像不太對喔！再仔細數一數畫面上的硬幣吧。
                                                    </p>
                                                )}
                                            </div>
                                        )}

                                        {/* Step 6: 挑戰成功成果回饋 */}
                                        {step === 6 && (
                                            <div class="text-center space-y-5 py-2 animate-in zoom-in-95 duration-300">
                                                <h4 class="text-teal-950 font-black text-2xl flex items-center justify-center space-x-2">
                                                    <span>🎉 恭喜你！挑戰成功！</span>
                                                </h4>
                                                <div class="bg-teal-50 border border-teal-200 text-teal-800 rounded-2xl p-4 max-w-md mx-auto text-sm space-y-2 text-left">
                                                    <p class="flex justify-between border-b border-teal-100 pb-1.5 font-extrabold">
                                                        <span>正確答案：</span>
                                                        <span class="text-teal-600 text-lg">{currentProblem.answer} 元</span>
                                                    </p>
                                                    <p class="flex justify-between pt-1">
                                                        <span>一開始心算鎖定的答案：</span>
                                                        <span class="font-extrabold text-indigo-700">{mentalLockValue} 元</span>
                                                    </p>
                                                    {parseInt(mentalLockValue) === currentProblem.answer ? (
                                                        <p class="text-indigo-800 bg-indigo-50 border border-indigo-100 px-3 py-2 rounded-xl font-extrabold text-xs mt-3 text-center">
                                                            🌟 太不可思議了！你的心算答案與畫硬幣答案完全一樣！太聰明啦！
                                                        </p>
                                                    ) : (
                                                        <p class="text-slate-600 font-medium text-xs mt-3 text-center">
                                                            雖然心算有一點小誤差，但藉由畫硬幣你成功找到了正確答案！畫圖是不是很棒的工具呢？
                                                        </p>
                                                    )}
                                                </div>
                                                
                                                <div class="pt-2">
                                                    {activeTab === 'random' ? (
                                                        <button
                                                            onClick={() => {
                                                                const isGuessCorrect = parseInt(mentalLockValue) === currentProblem.answer;
                                                                const points = 10 + (isGuessCorrect ? 5 : 0);
                                                                setRandomScore(randomScore + points);
                                                                handleRandomNext();
                                                            }}
                                                            class="bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white font-black px-8 py-3.5 rounded-2xl shadow-lg transition transform hover:scale-105 active:scale-95 text-sm"
                                                        >
                                                            {randomCurrentIndex + 1 < randomQuestionsList.length ? '下一題挑戰 ➡️' : '看挑戰成果 🏆'}
                                                        </button>
                                                    ) : (
                                                        <button
                                                            onClick={() => {
                                                                // 切換至同單元下一題
                                                                const currentList = textbookProblems[selectedCategory];
                                                                const currentIndex = currentList.findIndex(p => p.id === currentProblem.id);
                                                                if (currentIndex !== -1 && currentIndex + 1 < currentList.length) {
                                                                    resetProblem(currentList[currentIndex + 1]);
                                                                } else {
                                                                    // 循環回到第一題
                                                                    resetProblem(currentList[0]);
                                                                }
                                                            }}
                                                            class="bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white font-black px-8 py-3.5 rounded-2xl shadow-lg transition transform hover:scale-105 active:scale-95 text-sm"
                                                        >
                                                            再挑戰下一題 ➡️
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
